<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: custom-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container d-flex justify-content-center align-items-center mb-5" style="min-height: 70vh;">
    <div class="card card-custom p-5" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <h2 class="text-dark fw-bold">Chào mừng trở lại</h2>
            <p class="text-muted">Đăng nhập để tiếp tục việc học</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger bg-danger-subtle border-0 text-danger fw-medium rounded-3 py-2">Sai thông tin đăng nhập!</div>
        <div th:if="${param.success}" class="alert alert-success bg-success-subtle border-0 text-success fw-medium rounded-3 py-2">Đăng ký thành công!</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label text-dark fw-bold">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control form-control-custom py-2" placeholder="Nhập username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-dark fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control form-control-custom py-2" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-custom-primary w-100 py-2 fs-6 mb-3">Đăng nhập ngay</button>
        </form>

        <div class="d-flex align-items-center my-4">
            <hr class="flex-grow-1 text-muted">
            <span class="mx-3 text-muted fw-bold" style="font-size: 0.85rem;">HOẶC</span>
            <hr class="flex-grow-1 text-muted">
        </div>

        <a href="/oauth2/authorization/google" class="btn btn-light border w-100 py-2 mb-4 d-flex justify-content-center align-items-center gap-2 fw-bold text-dark shadow-sm rounded-3">
            <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Tiếp tục với Google
        </a>

        <div class="text-center mt-3">
            <span class="text-muted">Chưa có tài khoản?</span> <a href="/register" class="text-primary fw-bold text-decoration-none">Đăng ký ngay</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
