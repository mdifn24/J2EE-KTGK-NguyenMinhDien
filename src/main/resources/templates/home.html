<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Danh sách học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: custom-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mb-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold fs-1 text-dark">Khám phá Học phần</h2>
        <p class="text-muted fs-5">Lựa chọn các môn học phù hợp với lộ trình của bạn</p>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="course : ${courses}">
            <div class="card h-100 card-custom overflow-hidden d-flex flex-column">
                <img th:src="${course.image}" alt="Course Image" style="height: 220px; object-fit: cover;">
                <div class="card-body d-flex flex-column p-4">
                    <span class="badge bg-light text-primary border border-primary-subtle rounded-pill align-self-start mb-2 px-3 py-2" th:text="${course.category.name}">Category</span>
                    <h5 class="card-title fw-bold fs-4 mb-3 text-dark" th:text="${course.name}">Tên môn học</h5>

                    <div class="card-text text-muted mb-4 flex-grow-1" style="font-size: 0.95rem;">
                        <div class="d-flex align-items-center mb-2">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="me-2 text-indigo"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                            <span>Tín chỉ: <strong class="text-dark" th:text="${course.credits}"></strong></span>
                        </div>
                        <div class="d-flex align-items-center">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="me-2 text-indigo"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <span>Giảng viên: <strong class="text-dark" th:text="${course.lecturer}"></strong></span>
                        </div>
                    </div>

                    <div class="mt-auto" sec:authorize="hasRole('STUDENT')">
                        <form th:action="@{/enroll/{id}(id=${course.id})}" method="post">
                            <button type="submit" class="btn btn-custom-primary w-100 py-2 fs-6">Đăng ký ngay</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-5">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                <a class="page-link shadow-sm border-0 text-dark rounded-start-3" th:href="@{/home(page=${currentPage - 1}, keyword=${keyword})}">Trang trước</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                <a class="page-link shadow-sm border-0 text-dark rounded-end-3 ms-1" th:href="@{/home(page=${currentPage + 1}, keyword=${keyword})}">Trang sau</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
