<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: custom-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-4 mb-5">
    <div class="card card-custom p-5 mx-auto" style="max-width: 650px;">
        <div class="text-center mb-5">
            <h3 class="fw-bold fs-2 text-dark" th:text="${course.id == null ? 'Thêm Học Phần' : 'Cập Nhật Học Phần'}"></h3>
            <p class="text-muted">Nhập đầy đủ thông tin bên dưới để lưu vào hệ thống</p>
        </div>

        <form th:action="@{/admin/courses/save}" method="post" th:object="${course}" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">

            <div class="mb-4">
                <label class="form-label text-dark fw-bold">Tên học phần</label>
                <input type="text" th:field="*{name}" class="form-control form-control-custom py-2" placeholder="Ví dụ: Lập trình Java cơ bản" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-dark fw-bold">Hình ảnh đại diện</label>
                <input type="file" name="imageFile" class="form-control form-control-custom py-2" accept="image/png, image/jpeg" th:required="${course.id == null}">
                <div th:if="${course.image != null}" class="mt-3 p-3 rounded-3 bg-light border">
                    <p class="text-muted mb-2 fw-medium" style="font-size: 0.85rem;">Ảnh hiện tại:</p>
                    <img th:src="${course.image}" class="shadow-sm" style="height: 80px; width: auto; border-radius: 6px;">
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label text-dark fw-bold">Số tín chỉ</label>
                    <input type="number" th:field="*{credits}" class="form-control form-control-custom py-2" placeholder="Ví dụ: 3" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-dark fw-bold">Giảng viên</label>
                    <input type="text" th:field="*{lecturer}" class="form-control form-control-custom py-2" placeholder="Tên giảng viên" required>
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label text-dark fw-bold">Danh mục (Category)</label>
                <select th:field="*{category.id}" class="form-select form-control-custom py-2">
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                <a href="/admin/courses" class="btn btn-light fw-bold text-muted px-4 py-2 border shadow-sm">Hủy bỏ</a>
                <button type="submit" class="btn btn-custom-primary px-5 py-2">Lưu thông tin</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
