<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: custom-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container d-flex justify-content-center align-items-center mb-5" style="min-height: 70vh;">
    <div class="card card-custom p-5" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <h2 class="text-dark fw-bold">Tạo tài khoản mới</h2>
            <p class="text-muted">Bắt đầu hành trình học tập của bạn</p>
        </div>

        <form th:action="@{/register}" method="post" th:object="${student}">
            <div class="mb-3">
                <label class="form-label text-dark fw-bold">Tên đăng nhập (Username)</label>
                <input type="text" th:field="*{username}" class="form-control form-control-custom py-2" placeholder="Ví dụ: student123" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-dark fw-bold">Email</label>
                <input type="email" th:field="*{email}" class="form-control form-control-custom py-2" placeholder="name@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-dark fw-bold">Mật khẩu (Password)</label>
                <input type="password" th:field="*{password}" class="form-control form-control-custom py-2" placeholder="Tạo mật khẩu an toàn" required>
            </div>
            <button type="submit" class="btn btn-custom-primary w-100 py-2 fs-6 mb-4 mt-2">Đăng ký tài khoản</button>
        </form>

        <div class="text-center">
            <span class="text-muted">Đã có tài khoản?</span> <a href="/login" class="text-primary fw-bold text-decoration-none">Đăng nhập</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
