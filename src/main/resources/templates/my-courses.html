<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học phần của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: custom-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-4 mb-5">
    <h2 class="mb-4 text-dark fw-bold fs-2">Học phần đã đăng ký</h2>
    <p class="text-muted mb-4">Danh sách các môn học bạn đang tham gia trong học kỳ này</p>

    <div class="table-custom-wrapper p-0">
        <div class="table-responsive">
            <table class="table table-custom table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="py-3 px-4 text-muted">Mã HP</th>
                    <th class="py-3 px-4 text-muted">Tên học phần</th>
                    <th class="py-3 px-4 text-muted">Số tín chỉ</th>
                    <th class="py-3 px-4 text-muted">Giảng viên</th>
                    <th class="py-3 px-4 text-muted">Ngày đăng ký</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="en : ${enrollments}">
                    <td class="py-3 px-4 fw-medium text-indigo" th:text="${'#' + en.course.id}"></td>
                    <td class="py-3 px-4 fw-bold text-dark" th:text="${en.course.name}"></td>
                    <td class="py-3 px-4" th:text="${en.course.credits}"></td>
                    <td class="py-3 px-4" th:text="${en.course.lecturer}"></td>
                    <td class="py-3 px-4" th:text="${en.enrollDate}"></td>
                </tr>
                <tr th:if="${enrollments.empty}">
                    <td colspan="5" class="text-center text-muted py-5">
                        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-3 text-secondary" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg><br>
                        Bạn chưa đăng ký học phần nào. <a href="/home" class="text-indigo text-decoration-none fw-bold">Khám phá ngay!</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
