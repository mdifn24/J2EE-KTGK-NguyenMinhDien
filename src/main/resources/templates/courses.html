<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: custom-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-4 mb-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <div>
            <h2 class="fw-bold fs-2 m-0 text-dark">Quản lý Học Phần</h2>
            <p class="text-muted m-0">Quản lý danh sách, thêm, sửa, xóa học phần trên hệ thống</p>
        </div>
        <a th:href="@{/admin/courses/new}" class="btn btn-custom-primary px-4 py-2">+ Thêm học phần mới</a>
    </div>

    <div class="table-custom-wrapper p-0">
        <div class="table-responsive">
            <table class="table table-custom table-hover align-middle mb-0 text-center">
                <thead>
                <tr>
                    <th class="py-3 px-4 text-muted">ID</th>
                    <th class="py-3 px-4 text-muted">Hình ảnh</th>
                    <th class="py-3 px-4 text-start text-muted">Tên học phần</th>
                    <th class="py-3 px-4 text-muted">Tín chỉ</th>
                    <th class="py-3 px-4 text-muted">Giảng viên</th>
                    <th class="py-3 px-4 text-muted">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courses}">
                    <td class="py-3 px-4 fw-medium" th:text="${course.id}"></td>
                    <td class="py-3 px-4">
                        <img th:src="${course.image}" class="shadow-sm" style="width: 80px; height: 50px; object-fit: cover; border-radius: 8px;">
                    </td>
                    <td class="py-3 px-4 fw-bold text-dark text-start" th:text="${course.name}"></td>
                    <td class="py-3 px-4" th:text="${course.credits}"></td>
                    <td class="py-3 px-4" th:text="${course.lecturer}"></td>
                    <td class="py-3 px-4">
                        <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-light border me-1 rounded-2 text-primary fw-medium">Sửa</a>
                        <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-danger rounded-2 fw-medium shadow-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này?');">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
